<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bomberman Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --sfondo:#15171f; --pannello:#232634; --accento:#ef7d57; --fiamma:#ffcd75;
    --testo:#f4f4f4; --erba:#3b7d4f; --erba2:#347046; --muro:#5a6178;
    --muro-top:#767d96; --cassa:#b06b3a; --cassa-top:#c8814b; --fiamma2:#ef7d57;
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body{ background:var(--sfondo); color:var(--testo); font-family:system-ui,-apple-system,sans-serif;
        min-height:100vh; display:flex; align-items:center; justify-content:center;
        padding:16px; user-select:none; touch-action:none; overflow:hidden; }
  .schermata{ width:100%; max-width:400px; display:none; flex-direction:column; gap:14px; }
  .schermata.attiva{ display:flex; }
  h1{ font-family:"Press Start 2P",monospace; font-size:18px; color:var(--accento); text-align:center; line-height:1.7; }
  input{ width:100%; padding:15px; font-size:16px; text-align:center; background:var(--pannello);
         border:2px solid #3a3f54; border-radius:12px; color:var(--testo); outline:none; }
  input:focus{ border-color:var(--accento); }
  #campoCodice{ font-family:"Press Start 2P",monospace; letter-spacing:6px; text-transform:uppercase; }
  button{ width:100%; padding:15px; font-size:15px; font-weight:600; border:none; border-radius:12px;
          color:#fff; background:#3a3f54; box-shadow:0 4px 0 #20232f; }
  button:active{ transform:translateY(3px); box-shadow:0 1px 0 #20232f; }
  button.primario{ background:var(--accento); color:#2a1206; box-shadow:0 4px 0 #b85535; }
  button:disabled{ opacity:.4; box-shadow:none; }
  .separatore{ text-align:center; opacity:.4; font-size:13px; }
  .errore{ color:#ff8080; text-align:center; font-size:14px; min-height:18px; }
  .codiceGrande{ font-family:"Press Start 2P",monospace; font-size:36px; letter-spacing:8px;
                 color:var(--fiamma); text-align:center; padding:14px; background:var(--pannello); border-radius:14px; }
  .etichetta{ text-align:center; opacity:.6; font-size:13px; }
  .listaGiocatori{ display:flex; flex-direction:column; gap:8px; }
  .giocatore{ display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--pannello);
              border-radius:12px; font-size:15px; }
  .pallino{ width:14px; height:14px; border-radius:50%; flex:none; }
  .badgeHost{ margin-left:auto; font-size:11px; background:var(--accento); color:#2a1206;
              padding:3px 8px; border-radius:6px; font-weight:700; }
  .attesa{ text-align:center; opacity:.6; font-size:14px; }

  /* opzioni in lobby */
  .opzioni{ display:flex; flex-direction:column; gap:8px; }
  .opz{ display:flex; align-items:center; justify-content:space-between; padding:13px 16px;
        background:var(--pannello); border-radius:12px; font-size:14px; box-shadow:none; color:var(--testo); }
  .opz .stato{ font-weight:700; padding:4px 12px; border-radius:20px; font-size:12px; background:#3a3f54; }
  .opz.on .stato{ background:#5ddf7a; color:#0c2a14; }
  .opzInfo{ text-align:center; font-size:13px; opacity:.75; background:var(--pannello);
            border-radius:12px; padding:12px; }

  /* gioco */
  #gioco{ max-width:520px; gap:8px; }
  #segna{ display:flex; justify-content:center; gap:14px; flex-wrap:wrap; font-size:13px; min-height:18px; }
  .punto{ display:flex; align-items:center; gap:6px; }
  .punto .pallino{ width:11px; height:11px; }
  canvas{ width:100%; height:auto; image-rendering:pixelated; border-radius:8px;
          box-shadow:0 10px 30px rgba(0,0,0,.5); background:var(--erba); }
  #comandi{ display:flex; align-items:center; justify-content:space-between; padding:6px 4px; }
  .dpad{ display:grid; grid-template-columns:repeat(3,56px); grid-template-rows:repeat(3,56px); gap:6px; }
  .tasto{ width:56px; height:56px; background:#3a3f54; border-radius:12px; color:var(--testo);
          font-size:20px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 #20232f; }
  #su{ grid-column:2; grid-row:1; } #sx{ grid-column:1; grid-row:2; }
  #dx{ grid-column:3; grid-row:2; } #giu{ grid-column:2; grid-row:3; }
  #bomba{ width:90px; height:90px; border-radius:50%; background:var(--accento); color:#2a1206;
          font-size:38px; box-shadow:0 6px 0 #b85535; }
  #statoGioco{ text-align:center; font-size:13px; opacity:.7; min-height:16px; }

  .overlay{ position:fixed; inset:0; background:rgba(10,11,16,.85); display:none;
            flex-direction:column; align-items:center; justify-content:center; gap:18px; text-align:center; padding:20px; }
  .overlay.mostra{ display:flex; }
  .overlay h2{ font-family:"Press Start 2P",monospace; font-size:20px; line-height:1.7; white-space:pre-line; }
  .classifica{ display:flex; flex-direction:column; gap:8px; min-width:200px; }
  .rigaClass{ display:flex; align-items:center; gap:10px; background:var(--pannello);
              padding:10px 16px; border-radius:10px; font-size:15px; }
  .rigaClass b{ margin-left:auto; color:var(--fiamma); }
</style>
</head>
<body>

  <!-- MENU -->
  <div class="schermata attiva" id="menu">
    <h1>CLEMO GOES<br>BOOM</h1>
    <input id="campoNome" placeholder="Il tuo nome" maxlength="12" value="Giocatore">
    <button class="primario" id="btnCrea">Crea partita</button>
    <button id="btnSolo">Gioca da solo (vs 3 bot)</button>
    <div class="separatore">— oppure —</div>
    <input id="campoCodice" placeholder="CODICE" maxlength="4">
    <button id="btnEntra">Entra con il codice</button>
    <div class="errore" id="errore"></div>
  </div>

  <!-- LOBBY -->
  <div class="schermata" id="lobby">
    <div id="zonaCodice">
      <div class="etichetta">Codice della partita</div>
      <div class="codiceGrande" id="mostraCodice">----</div>
    </div>
    <div class="etichetta" id="contaGiocatori">Giocatori</div>
    <div class="listaGiocatori" id="listaGiocatori"></div>

    <!-- opzioni: l'host le modifica, gli altri le vedono -->
    <div class="opzioni" id="opzioniHost" style="display:none">
      <button class="opz" id="optPowerup">Power-up <span class="stato">No</span></button>
      <button class="opz" id="optBest">Al meglio di 3 <span class="stato">No</span></button>
    </div>
    <div class="opzInfo" id="opzioniInfo" style="display:none"></div>

    <button class="primario" id="btnAvvia">Avvia partita</button>
    <div class="attesa" id="attesa">In attesa dell'host…</div>
  </div>

  <!-- GIOCO -->
  <div class="schermata" id="gioco">
    <div id="segna"></div>
    <canvas id="tela"></canvas>
    <div id="statoGioco"></div>
    <div id="comandi">
      <div class="dpad">
        <button class="tasto" id="su">▲</button>
        <button class="tasto" id="sx">◀</button>
        <button class="tasto" id="dx">▶</button>
        <button class="tasto" id="giu">▼</button>
      </div>
      <button id="bomba">💣</button>
    </div>
  </div>

  <!-- pausa fra round -->
  <div class="overlay" id="roundGioco">
    <h2 id="roundEsito"></h2>
    <div class="classifica" id="roundClass"></div>
    <div class="attesa">Prossimo round…</div>
  </div>

  <!-- fine serie -->
  <div class="overlay" id="fineGioco">
    <h2 id="esito"></h2>
    <div class="classifica" id="fineClass"></div>
    <button class="primario" id="tornaLobby" style="max-width:240px">Torna alla lobby</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const $ = (id)=>document.getElementById(id);
    function mostra(s){ document.querySelectorAll('.schermata').forEach(e=>e.classList.remove('attiva')); $(s).classList.add('attiva'); }

    const COLONNE=13, RIGHE=11, TILE=40, MURO=1, CASSA=2;
    const tela=$('tela'), ctx=tela.getContext('2d');
    tela.width=COLONNE*TILE; tela.height=RIGHE*TILE;

    let sonoHost=false, statoCorrente=null;
    let opzioniCorrenti={ powerup:false, bestOf3:false };

    /* --- menu / lobby --- */
    $('btnCrea').onclick  = ()=>socket.emit('creaPartita', $('campoNome').value.trim());
    $('btnSolo').onclick  = ()=>socket.emit('creaSingolo', $('campoNome').value.trim());
    $('btnEntra').onclick = ()=>{
      const c=$('campoCodice').value.trim();
      if(c.length<4){ $('errore').textContent='Inserisci un codice di 4 lettere'; return; }
      socket.emit('entra',{ codice:c, nome:$('campoNome').value.trim() });
    };
    $('btnAvvia').onclick = ()=>socket.emit('avvia');
    $('campoCodice').addEventListener('input', e=>e.target.value=e.target.value.toUpperCase());

    // interruttori delle opzioni (solo host)
    $('optPowerup').onclick = ()=>{ opzioniCorrenti.powerup=!opzioniCorrenti.powerup; socket.emit('opzioni', opzioniCorrenti); };
    $('optBest').onclick    = ()=>{ opzioniCorrenti.bestOf3=!opzioniCorrenti.bestOf3; socket.emit('opzioni', opzioniCorrenti); };

    socket.on('partitaCreata', ()=>{ sonoHost=true;  mostra('lobby'); });
    socket.on('entrato',       ()=>{ sonoHost=false; mostra('lobby'); });
    socket.on('erroreEntrata', (m)=>$('errore').textContent=m);

    socket.on('lobby', ({codice, giocatori, opzioni, singolo})=>{
      opzioniCorrenti = opzioni;
      $('mostraCodice').textContent = codice;
      // in solitaria il codice non serve: lo nascondiamo
      $('zonaCodice').style.display = singolo ? 'none' : 'block';
      $('contaGiocatori').textContent = singolo ? 'Tu + 3 bot' : ('Giocatori ' + giocatori.length + '/4');
      const lista=$('listaGiocatori'); lista.innerHTML='';
      const colori=['#41a6f6','#ff5d5d','#5ddf7a','#ffd454'];
      giocatori.forEach((g,i)=>{
        const r=document.createElement('div'); r.className='giocatore';
        r.innerHTML=`<span class="pallino" style="background:${colori[i%4]}"></span>${g.nome}`+
                    (g.host?`<span class="badgeHost">HOST</span>`:'');
        lista.appendChild(r);
      });
      // opzioni: host le tocca, gli altri le leggono
      if(sonoHost){
        $('opzioniHost').style.display='flex'; $('opzioniInfo').style.display='none';
        aggiornaInterruttore('optPowerup', opzioni.powerup);
        aggiornaInterruttore('optBest', opzioni.bestOf3);
      } else {
        $('opzioniHost').style.display='none'; $('opzioniInfo').style.display='block';
        $('opzioniInfo').textContent =
          'Power-up: ' + (opzioni.powerup?'Sì':'No') + '  ·  Al meglio di 3: ' + (opzioni.bestOf3?'Sì':'No');
      }
      $('btnAvvia').style.display = sonoHost?'block':'none';
      $('attesa').style.display   = sonoHost?'none':'block';
      $('btnAvvia').disabled = giocatori.length<2;
    });

    function aggiornaInterruttore(id, acceso){
      const b=$(id); b.classList.toggle('on', acceso);
      b.querySelector('.stato').textContent = acceso?'Sì':'No';
    }

    /* --- gioco e serie --- */
    socket.on('iniziata', ()=>{ chiudiOverlay(); mostra('gioco'); });
    socket.on('nuovoRound', ({classifica})=>{ chiudiOverlay(); disegnaSegna(classifica); });
    socket.on('stato', (s)=>{ statoCorrente=s; });
    socket.on('roundFinito', ({vincitore, classifica})=>{
      $('roundEsito').textContent = vincitore ? (vincitore+' vince il round') : 'Round pari';
      riempiClassifica('roundClass', classifica);
      $('roundGioco').classList.add('mostra');
    });
    socket.on('fine', ({vincitore, classifica})=>{
      $('esito').textContent = vincitore ? ('Ha vinto\n'+vincitore+'!') : 'Pareggio!';
      riempiClassifica('fineClass', classifica);
      $('fineGioco').classList.add('mostra');
    });
    $('tornaLobby').onclick = ()=>{ chiudiOverlay(); mostra('lobby'); };

    function chiudiOverlay(){ $('roundGioco').classList.remove('mostra'); $('fineGioco').classList.remove('mostra'); }
    function disegnaSegna(classifica){
      const seg=$('segna'); seg.innerHTML='';
      classifica.forEach(c=>{
        const d=document.createElement('div'); d.className='punto';
        d.innerHTML=`<span class="pallino" style="background:${c.colore}"></span>${c.nome}: <b>${c.punti}</b>`;
        seg.appendChild(d);
      });
    }
    function riempiClassifica(id, classifica){
      const box=$(id); box.innerHTML='';
      classifica.sort((a,b)=>b.punti-a.punti).forEach(c=>{
        const r=document.createElement('div'); r.className='rigaClass';
        r.innerHTML=`<span class="pallino" style="background:${c.colore}"></span>${c.nome}<b>${c.punti}</b>`;
        box.appendChild(r);
      });
    }

    /* --- controlli --- */
    function tastoDir(id, dir){
      const t=$(id);
      t.addEventListener('pointerdown', e=>{ e.preventDefault(); socket.emit('muovi', dir); });
      const stop=()=>socket.emit('muovi', null);
      t.addEventListener('pointerup', stop); t.addEventListener('pointerleave', stop); t.addEventListener('pointercancel', stop);
    }
    tastoDir('su','su'); tastoDir('giu','giu'); tastoDir('sx','sx'); tastoDir('dx','dx');
    $('bomba').addEventListener('pointerdown', e=>{ e.preventDefault(); socket.emit('bomba'); });
    document.addEventListener('keydown', e=>{
      if(e.key==='ArrowUp'||e.key==='w') socket.emit('muovi','su');
      if(e.key==='ArrowDown'||e.key==='s') socket.emit('muovi','giu');
      if(e.key==='ArrowLeft'||e.key==='a') socket.emit('muovi','sx');
      if(e.key==='ArrowRight'||e.key==='d') socket.emit('muovi','dx');
      if(e.key===' '){ e.preventDefault(); socket.emit('bomba'); }
    });
    document.addEventListener('keyup', ()=>socket.emit('muovi', null));

    /* --- disegno --- */
    function col(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }
    function riquadro(px,py,c,cTop,dim=TILE){ ctx.fillStyle=c; ctx.fillRect(px,py,dim,dim);
      ctx.fillStyle=cTop; ctx.fillRect(px,py,dim,4); ctx.fillRect(px,py,4,dim); }
    const COLORE_PU={ bomba:'#222', fuoco:'#ef7d57', velocita:'#41a6f6' };
    const LETTERA_PU={ bomba:'B', fuoco:'F', velocita:'V' };

    function disegna(){
      requestAnimationFrame(disegna);
      const s=statoCorrente; if(!s) return;
      for(let y=0;y<RIGHE;y++) for(let x=0;x<COLONNE;x++){
        const t=s.mappa[y][x], px=x*TILE, py=y*TILE;
        if(t===MURO){ riquadro(px,py,col('--muro'),col('--muro-top')); }
        else { ctx.fillStyle=(x+y)%2?col('--erba'):col('--erba2'); ctx.fillRect(px,py,TILE,TILE);
               if(t===CASSA) riquadro(px+3,py+3,col('--cassa'),col('--cassa-top'),TILE-6); }
      }
      // power-up
      if(s.powerups) for(const p of s.powerups){
        const px=p.x*TILE, py=p.y*TILE;
        ctx.fillStyle=COLORE_PU[p.tipo]||'#fff';
        ctx.fillRect(px+9,py+9,TILE-18,TILE-18);
        ctx.fillStyle='#fff'; ctx.font='bold 16px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(LETTERA_PU[p.tipo]||'?', px+TILE/2, py+TILE/2+1);
      }
      // bombe
      for(const b of s.bombe){
        const px=b.x*TILE+TILE/2, py=b.y*TILE+TILE/2;
        ctx.fillStyle=Math.floor(b.tempo/150)%2===0?'#111':'#333';
        ctx.beginPath(); ctx.arc(px,py,TILE*0.32,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=col('--accento'); ctx.fillRect(px-2,py-TILE*0.42,4,6);
      }
      // fiamme
      for(const f of s.fiamme){ const px=f.x*TILE, py=f.y*TILE;
        ctx.fillStyle=col('--fiamma2'); ctx.fillRect(px+2,py+2,TILE-4,TILE-4);
        ctx.fillStyle=col('--fiamma');  ctx.fillRect(px+8,py+8,TILE-16,TILE-16); }
      // giocatori
      for(const g of s.giocatori){
        if(!g.vivo) continue;
        const px=g.x*TILE, py=g.y*TILE;
        riquadro(px+6,py+6,g.colore,'#ffffff55',TILE-12);
        if(g.id===socket.id){ ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(px+4,py+4,TILE-8,TILE-8); }
        ctx.fillStyle='#fff'; ctx.fillRect(px+13,py+15,5,6); ctx.fillRect(px+22,py+15,5,6);
        ctx.fillStyle='#15171f'; ctx.fillRect(px+15,py+17,3,4); ctx.fillRect(px+24,py+17,3,4);
      }
      const me=s.giocatori.find(g=>g.id===socket.id);
      $('statoGioco').textContent = (me && !me.vivo) ? 'Sei esploso! Guarda chi vince…' : '';
    }
    requestAnimationFrame(disegna);
  </script>
</body>
</html>
